name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (plugin + daemon)
        run: npm run build

      - name: Typecheck plugin
        run: npm run typecheck -w plugin

      - name: Typecheck daemon
        run: npm run typecheck -w daemon

      - name: Plugin tests
        run: npm run test -w plugin

      - name: Daemon smoke
        run: npm run smoke -w daemon
